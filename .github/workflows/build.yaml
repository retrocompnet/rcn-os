name: 'build'

on:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Run build script
        id: build
        run: |
          ./build_image.sh
      - name: Check outputs
        run: |
          ls -l
      - name: Upload full image
        uses: actions/upload-artifact@v6
        id: rcn_os
        with:
          name: rcn_os
          path: |
            rcn_os.img.gz
            rcn_os.img.gz.sha256
          if-no-files-found: error
      - name: Upload update
        uses: actions/upload-artifact@v6
        id: rcn_os_update
        with:
          name: rcn_os_update
          path: |
            rcn_os_update.img.gz
            rcn_os_update.img.gz.sha256
          if-no-files-found: error
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rcn_os.img.gz
            rcn_os_update.img.gz
